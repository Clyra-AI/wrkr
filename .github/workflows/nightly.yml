name: nightly

on:
  schedule:
    - cron: '18 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  risk-lane:
    name: risk-lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.26.1'
          check-latest: false

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Setup CodeQL
        uses: github/codeql-action/init@v4.33.0
        with:
          languages: go

      - name: Run prepush full
        run: make prepush-full

      - name: Run v1 acceptance full cadence
        run: scripts/run_v1_acceptance.sh --mode=nightly

      - name: Run contract determinism smoke
        run: scripts/validate_contracts.sh

      - name: Run hardening suites
        run: scripts/test_hardening_all.sh

      - name: Run chaos suites
        run: scripts/test_chaos_all.sh

      - name: Run performance budgets
        run: scripts/test_perf_budgets.sh

      - name: Run agent benchmark gate
        run: scripts/run_agent_benchmarks.sh --output .tmp/agent-benchmarks-nightly.json

      - name: Run cross-product interop suite
        run: go test ./internal/integration/interop -count=1

      - name: Run race lane
        run: go test -race ./... -count=1

      - name: Run vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go build -o .tmp/wrkr ./cmd/wrkr
          "$(go env GOPATH)/bin/govulncheck" -mode=binary .tmp/wrkr

      - name: Upload v1 acceptance scorecard
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: v1-acceptance-scorecard-nightly
          path: |
            .tmp/release/v1-scorecard.json
            .tmp/release/v1-scorecard.md

      - name: Upload agent benchmark report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: agent-benchmark-nightly
          path: .tmp/agent-benchmarks-nightly.json
