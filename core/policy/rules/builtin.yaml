rules:
  - id: WRKR-011
    title: Built-in policy rule pack must load
    severity: high
    remediation: Restore built-in policy rule pack integrity.
    kind: policy_rule_pack_loaded
    version: 1
  - id: WRKR-012
    title: Policy schema contract must remain stable
    severity: low
    remediation: Keep policy schema fields and enums backward compatible.
    kind: schema_contract_maintained
    version: 1
  - id: WRKR-013
    title: Skill privilege ceiling must not include proc.exec with credentials
    severity: high
    remediation: Remove exec grants from skills or eliminate credential-bearing contexts.
    kind: skill_exec_plus_credentials
    version: 1
  - id: WRKR-014
    title: Skill allowed-tools must not conflict with Gait policy
    severity: high
    remediation: Align skill allowed-tools grants with Gait block rules.
    kind: skill_policy_conflicts
    version: 1
  - id: WRKR-015
    title: Skill sprawl exec ratio must be <= 50%
    severity: medium
    remediation: Reduce exec-granting skills and narrow tool permissions.
    kind: skill_sprawl_exec_ratio
    version: 1
  - id: WRKR-016
    title: Prompt-channel override and poisoning findings must be remediated
    severity: high
    remediation: Remove prompt override/injection patterns or gate them behind explicit review and policy controls.
    kind: prompt_channel_governance
    version: 1
  - id: WRKR-A001
    title: Agent approval posture must be explicit
    severity: high
    remediation: Mark each discovered agent as approved or add a deterministic approval workflow.
    kind: agent_approval_required
    version: 1
  - id: WRKR-A002
    title: Production-write agents require human gate
    severity: high
    remediation: Add an explicit human gate before production-write or auto-deploy agent execution.
    kind: agent_prod_write_human_gate
    version: 1
  - id: WRKR-A003
    title: Secret-bearing agent context must be controlled
    severity: medium
    remediation: Replace inline secrets with managed references and declare deterministic secret controls.
    kind: agent_secret_controls
    version: 1
  - id: WRKR-A004
    title: Agent egress and exfil controls must be declared
    severity: high
    remediation: Declare and enforce egress controls before external network access is allowed.
    kind: agent_exfil_controls
    version: 1
  - id: WRKR-A005
    title: Agent delegation flows must be policy controlled
    severity: medium
    remediation: Require explicit delegation policy entries for agent-to-agent execution chains.
    kind: agent_delegation_controls
    version: 1
  - id: WRKR-A006
    title: Dynamic discovery must be gated
    severity: medium
    remediation: Disable dynamic tool discovery by default or gate it with deterministic approval.
    kind: agent_dynamic_discovery_controls
    version: 1
  - id: WRKR-A007
    title: Kill switch capability is required for deployed agents
    severity: medium
    remediation: Configure deterministic kill-switch controls for each deployed agent.
    kind: agent_kill_switch_required
    version: 1
  - id: WRKR-A008
    title: Agent data classification must be explicit
    severity: medium
    remediation: Annotate each agent with deterministic data classification metadata.
    kind: agent_data_classification_required
    version: 1
  - id: WRKR-A009
    title: Auto-deploy paths require deployment gate controls
    severity: low
    remediation: Add deterministic deployment gate metadata for auto-deploying agents.
    kind: agent_auto_deploy_gate
    version: 1
  - id: WRKR-A010
    title: Auto-deploy without human gate must fail closed
    severity: low
    remediation: Require human_gate=true for auto_deploy=true agents before release.
    kind: agent_autodeploy_without_human_gate
    version: 1
