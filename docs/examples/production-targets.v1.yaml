# Wrkr applies deterministic built-in production-target packs by default for common
# deploy, IaC, Kubernetes, release, package-publish, database-migration, and
# customer-impacting workflows. Supply a custom file like this when you want
# explicit org-local overrides to be authoritative.
schema_version: v1
targets:
  repos:
    exact:
      - acme/payments-service
  mcp_servers:
    exact:
      - postgres-prod
      - redis-prod
  hosts:
    exact:
      - prod-db.acme.internal
      - api.prod.acme.com
  workflow_env_keys:
    exact:
      - PRODUCTION
      - DEPLOY_ENV
  workflow_env_values:
    exact:
      - prod
      - production
write_permissions:
  - filesystem.write
  - db.write
  - deploy.write
  - infra.write
