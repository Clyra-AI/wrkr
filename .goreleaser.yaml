version: 2

project_name: wrkr

builds:
  - id: wrkr
    main: ./cmd/wrkr
    binary: wrkr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: wrkr-archive
    ids:
      - wrkr
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: wrkr
    ids:
      - wrkr-archive
    directory: Formula
    repository:
      owner: Clyra-AI
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/Clyra-AI/wrkr
    description: Deterministic AI tooling discovery, risk scoring, and proof artifacts
    license: Apache-2.0
    commit_author:
      name: clyra-release-bot
      email: releases@clyra.ai
    install: |
      bin.install "wrkr"
    test: |
      output = shell_output("#{bin}/wrkr --json")
      assert_match "\"status\":\"ok\"", output
    skip_upload: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true
